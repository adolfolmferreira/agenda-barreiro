name: Scrape & Update Events

on:
  schedule:
    - cron: '0 8 * * *'
    - cron: '0 18 * * *'
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - run: npm ci

      - run: npx playwright install chromium --with-deps

      - name: Scrape events
        run: npx tsx scripts/scrape.ts
        timeout-minutes: 10

      - name: Commit & Push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/events.json
          git diff --staged --quiet || (
            git commit -m "🔄 Eventos actualizados $(date -u +'%Y-%m-%d %H:%M') UTC"
            git push
          )
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Scrape Viral Agenda
        run: npx tsx scripts/scrape-viral.ts
        timeout-minutes: 3

      - name: Commit Viral events
        run: |
          git add data/events.json
          git diff --staged --quiet || (
            git commit -m "🔄 Viral Agenda events updated"
          )

      - name: Trigger Netlify Deploy
        run: curl -s -X POST "https://api.netlify.com/build_hooks/69afe8f721e75f7c8c60c7be"
